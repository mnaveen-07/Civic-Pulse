<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicPulse - Enhanced Community Reporting</title>

    <!-- PWA Manifest Link -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Lato:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. ROOT & THEME DEFINITIONS --- */
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #10b981;
            --accent-color: #f97316;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --background-color: #f1f5f9;
            --card-background: #ffffff;
            --text-color: #0f172a;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -2px rgb(0 0 0 / 0.1);
            --border-radius: 0.75rem;
            --font-family: 'Inter', sans-serif;
            font-size: 16px;
        }
        
        body.dark-mode {
            --background-color: #0f172a;
            --card-background: #1e293b;
            --text-color: #f1f5f9;
            --text-light: #94a3b8;
            --border-color: #334155;
        }

        /* --- 2. BASE & LAYOUT STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-family);
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            transition: opacity 0.5s ease;
        }

        .app-container.logged-out {
            opacity: 0;
            pointer-events: none;
        }

        .sidebar {
            width: 280px;
            background: var(--card-background);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            transition: width 0.3s ease, background-color 0.3s, transform 0.3s ease;
            position: relative;
            z-index: 100;
        }
        
        .main-content { flex-grow: 1; height: 100vh; overflow-y: auto; padding: 2rem; position: relative; }
        .view { display: none; animation: fadeIn 0.5s ease-in-out; }
        .view.active { display: block; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .menu-toggle { display: none; }

        .sidebar .logo {
            font-size: 1.75rem; font-weight: 800; color: var(--primary-color);
            margin-bottom: 2.5rem; display: flex; align-items: center; gap: 10px;
        }
        .sidebar .logo span { color: var(--secondary-color); }
        .sidebar nav a {
            display: flex; align-items: center; padding: 1rem; margin-bottom: 0.5rem;
            border-radius: 0.5rem; text-decoration: none; color: var(--text-light);
            font-weight: 600; transition: all 0.3s; white-space: nowrap; cursor: pointer;
        }
        .sidebar nav a.active, .sidebar nav a:hover {
            background-color: var(--primary-color); color: #fff;
            transform: translateX(5px); box-shadow: var(--shadow);
        }
        .sidebar nav a i { width: 24px; margin-right: 1.25rem; }

        .profile {
            margin-top: auto; padding: 1rem; border-radius: var(--border-radius);
            display: flex; align-items: center; cursor: pointer;
            border: 1px solid transparent; transition: all 0.3s;
        }
        .profile:hover { border-color: var(--border-color); background: var(--background-color); }
        .profile img { width: 45px; height: 45px; border-radius: 50%; margin-right: 1rem; object-fit: cover; }
        .profile .profile-info { display: flex; flex-direction: column; justify-content: center; }
        .profile .name { font-weight: 700; }
        .profile .score { color: var(--text-light); font-size: 0.875rem; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        header h1 { font-size: 2.25rem; font-weight: 800; }
        .header-actions { display: flex; align-items: center; gap: 1rem; }

        .action-btn {
            background: var(--card-background); border: 1px solid var(--border-color);
            color: var(--text-color); width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s; position: relative;
        }
        .action-btn:hover { background: var(--primary-color); color: #fff; transform: translateY(-2px); }
        .action-btn .badge {
            position: absolute; top: -5px; right: -5px; background: var(--danger-color);
            color: white; width: 20px; height: 20px; border-radius: 50%;
            font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--card-background);
        }

        .report-button, .btn {
            background: var(--primary-color); color: #fff;
            border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .report-button:hover, .btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: var(--shadow-lg); }
        .btn.secondary { background: var(--text-light); }
        .btn.danger { background: var(--danger-color); }
        .btn.warning { background: var(--warning-color); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: var(--card-background); padding: 1.5rem; border-radius: var(--border-radius); box-shadow: var(--shadow); transition: all 0.3s; }
        .stat-card.clickable { cursor: pointer; }
        .stat-card.clickable:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .stat-header { display: flex; align-items: center; margin-bottom: 1rem; }
        .stat-icon { width: 40px; height: 40px; border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size: 18px; margin-right: 1rem; }
        .stat-icon.reports { background-color: rgba(79, 70, 229, 0.1); color: var(--primary-color); }
        .stat-icon.progress { background-color: rgba(245, 158, 11, 0.1); color: var(--warning-color); }
        .stat-icon.resolved { background-color: rgba(16, 185, 129, 0.1); color: var(--secondary-color); }
        .stat-icon.spam { background-color: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        .stat-title { font-size: 0.875rem; color: var(--text-light); }
        .stat-value { font-size: 2rem; font-weight: 800; }
        
        .issues-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        .issue-card { background: var(--card-background); padding: 1rem; border-radius: var(--border-radius); box-shadow: var(--shadow); cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; position: relative; }
        .issue-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-lg); }
        .issue-card .card-image { width: 100%; height: 180px; object-fit: cover; border-radius: 0.5rem; margin-bottom: 1rem; }
        .issue-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.25rem; }
        .issue-card .location { color: var(--text-light); font-size: 0.875rem; margin-bottom: 1rem; }
        .card-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border-color);}
        .card-actions { display: flex; gap: 0.5rem; align-items: center; }
        
        /* Image Gallery Styles */
        .image-gallery { position: relative; }
        .image-gallery .main-image { width: 100%; height: 180px; object-fit: cover; border-radius: 0.5rem; margin-bottom: 0.5rem; }
        .image-gallery .thumbnail-row { display: flex; gap: 0.25rem; overflow-x: auto; }
        .image-gallery .thumbnail { width: 40px; height: 40px; object-fit: cover; border-radius: 0.25rem; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .image-gallery .thumbnail:hover, .image-gallery .thumbnail.active { border-color: var(--primary-color); }
        .image-count-badge { position: absolute; top: 0.5rem; right: 0.5rem; background: rgba(0,0,0,0.7); color: white; padding: 0.25rem 0.5rem; border-radius: 1rem; font-size: 0.75rem; }
        
        .status-pill { padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; color: #fff; text-transform: uppercase; }
        .status-pill.resolved { background-color: var(--secondary-color); }
        .status-pill.in-progress { background-color: var(--warning-color); }
        .status-pill.reported { background-color: var(--danger-color); }
        .status-pill.spam { background-color: #6b7280; }
        
        .upvote-btn, .support-btn, .report-btn { background: #eef2ff; border: none; padding: 0.5rem 1rem; border-radius: 99px; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: all 0.3s; color: var(--primary-color); font-weight: 700; font-size: 0.875rem; }
        .support-btn { background: rgba(16, 185, 129, 0.1); color: var(--secondary-color); }
        .report-btn { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
        
        body.dark-mode .upvote-btn { background: rgba(79, 70, 229, 0.3); color: #c7d2fe; }
        body.dark-mode .support-btn { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        body.dark-mode .report-btn { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        
        .upvote-btn.voted, .support-btn.supported { background: var(--primary-color); color: #fff; }
        .support-btn.supported { background: var(--secondary-color); }
        .upvote-btn:hover:not(.voted) { background: #c7d2fe; }
        .support-btn:hover:not(.supported) { background: rgba(16, 185, 129, 0.3); }
        .report-btn:hover { background: rgba(239, 68, 68, 0.2); }

        /* Photo Upload Styles */
        .photo-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            transition: all 0.3s;
            margin: 1rem 0;
        }
        .photo-upload-area.drag-over {
            border-color: var(--primary-color);
            background: rgba(79, 70, 229, 0.05);
        }
        .photo-upload-area input[type="file"] {
            display: none;
        }
        .upload-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }
        .upload-preview .preview-item {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .upload-preview .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0.5rem;
            border: 2px solid var(--border-color);
        }
        .upload-preview .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger-color);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; z-index: 1000; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .modal-overlay.visible { opacity: 1; visibility: visible; }
        .modal-content { background: var(--card-background); padding: 2.5rem; border-radius: var(--border-radius); width: 90%; max-width: 600px; transform: translateY(30px) scale(0.95); transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: var(--shadow-lg); position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-overlay.visible .modal-content { transform: translateY(0) scale(1); }
        .modal-close-btn { position: absolute; top: 1rem; right: 1rem; width: 40px; height: 40px; border-radius: 50%; background: var(--background-color); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; z-index: 10; }
        .modal-close-btn:hover { background: var(--border-color); transform: rotate(90deg); }

        /* Enhanced Duplicate Detection Modal Styles */
        .duplicate-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .duplicate-warning .warning-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--warning-color);
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .existing-issue-preview {
            background: var(--card-background);
            border-radius: 0.5rem;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid var(--border-color);
        }
        
        .existing-issue-preview h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        
        .existing-issue-preview .location {
            color: var(--text-light);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }
        
        .similarity-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.5rem;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
        
        .similarity-metrics .metric {
            background: var(--background-color);
            padding: 0.5rem;
            border-radius: 0.25rem;
            text-align: center;
            font-weight: 600;
        }
        
        .duplicate-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .duplicate-actions .btn {
            flex: 1;
            justify-content: center;
        }

        /* Report Issue Modal Styles */
        .report-issue-modal {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        #map { height: calc(100vh - 12rem); width: 100%; border-radius: var(--border-radius); z-index: 1; }
        .leaflet-container { background: var(--background-color); }

        .toast-notification { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(200%); background: var(--text-color); color: white; padding: 1rem 1.5rem; border-radius: 0.5rem; box-shadow: var(--shadow-lg); z-index: 2000; display: flex; align-items: center; gap: 10px; transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .toast-notification.show { transform: translateX(-50%) translateY(0); }
        .toast-notification.success { background: var(--secondary-color); }
        .toast-notification.error { background: var(--danger-color); }
        
        .dropdown-menu { position: absolute; top: calc(100% + 10px); right: 0; background: var(--card-background); border-radius: 0.75rem; padding: 0.5rem; box-shadow: var(--shadow-lg); z-index: 100; min-width: 250px; transform: translateY(10px); opacity: 0; visibility: hidden; transition: all 0.3s; }
        .dropdown-menu.show { transform: translateY(0); opacity: 1; visibility: visible; }
        .dropdown-item { padding: 0.75rem 1rem; cursor: pointer; border-radius: 0.5rem; display: flex; align-items: center; gap: 10px; }
        .dropdown-item:hover { background: var(--background-color); }
        .dropdown-item.unread { font-weight: bold; }

        .accessibility-panel { 
            position: fixed; 
            top: 50%; 
            right: 10px; 
            transform: translateY(-50%); 
            background: var(--card-background); 
            border-radius: 1rem; 
            padding: 1rem; 
            box-shadow: var(--shadow-lg); 
            z-index: 200; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            border: 1px solid var(--border-color);
        }
        .accessibility-btn { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            background: var(--card-background);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
        }
        .accessibility-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .charts-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 1024px) { .charts-grid { grid-template-columns: 1fr 1fr; } }
        .chart-container { position: relative; height: 400px; width: 100%; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid var(--border-color); background: var(--background-color); color: var(--text-color); font-size: 1rem; }
        .profile-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .dashboard-section { margin-bottom: 2.5rem; }
        .dashboard-section h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }

        .login-options { display: flex; gap: 1rem; justify-content: center; }
        
        .theme-selector { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; }
        .theme-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid var(--card-background); box-shadow: 0 0 0 1px var(--border-color); transition: all 0.3s; }
        .theme-option:hover, .theme-option.active { transform: scale(1.1); box-shadow: 0 0 0 3px var(--primary-color); }

        .font-selector { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .font-option { padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; border: 1px solid var(--border-color); background: var(--background-color); transition: all 0.3s; }
        .font-option.active, .font-option:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .toggle-switch { 
            width: 50px; height: 28px; background-color: var(--border-color); 
            border-radius: 14px; position: relative; cursor: pointer; transition: all 0.3s;
        }
        .toggle-switch::before { 
            content: ''; position: absolute; width: 22px; height: 22px; 
            border-radius: 50%; background-color: white; top: 3px; left: 3px; 
            transition: all 0.3s; 
        }
        .toggle-switch.active { background-color: var(--secondary-color); }
        .toggle-switch.active::before { transform: translateX(22px); }
        
        .mobile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 99; opacity: 0;
            visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .mobile-overlay.active { opacity: 1; visibility: visible; }

        /* --- NEW: Voice Report Button Styles --- */
        .voice-report-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 999;
            transition: all 0.3s ease;
        }
        .voice-report-btn:hover {
            transform: scale(1.1) translateY(-5px);
            background: var(--secondary-color);
        }

        /* --- NEW: Voice Modal Styles --- */
        .voice-modal-content {
            text-align: center;
        }
        .voice-modal-content h3 {
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }
        .voice-modal-content p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }
        .voice-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .voice-btn {
            background: var(--background-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .voice-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        .voice-btn.recording {
            background: var(--danger-color);
            color: white;
            border-color: var(--danger-color);
            animation: pulse 1.5s infinite;
        }
        .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .voice-status {
            margin: 1rem 0;
            font-size: 1rem;
            color: var(--text-light);
            min-height: 24px;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow: auto; }
            .sidebar {
                position: fixed; left: 0; height: 100%; box-shadow: var(--shadow-lg);
                transform: translateX(-100%);
            }
            .sidebar.active { transform: translateX(0); }
            .main-content {
                padding: 1rem; margin-top: 50px; overflow-y: visible;
                height: auto; flex-grow: 1;
            }
            header { margin-top: 1rem; }
            .menu-toggle {

<script>
(function() {
    'use strict';
    
    // --- API CONFIGURATION ---
    const API_BASE_URL = 'http://localhost:5000/api';
    const getAuthToken = () => localStorage.getItem('civicpulse_token');
    const setAuthToken = (token) => localStorage.setItem('civicpulse_token', token);
    const clearAuthToken = () => localStorage.removeItem('civicpulse_token');

    const apiCall = async (endpoint, options = {}) => {
        const token = getAuthToken();
        
        const headers = {
            ...(token && { 'Authorization': `Bearer ${token}` }),
            ...options.headers
        };
        
        if (options.body && !(options.body instanceof FormData)) {
            headers['Content-Type'] = 'application/json';
        }

        try {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                ...options,
                headers
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'API request failed');
            }

            return await response.json();
        } catch (error) {
            console.error('API Error:', error);
            throw error;
        }
    };

    const API = {
        users: {
            register: (userData) => apiCall('/users/register', { method: 'POST', body: JSON.stringify(userData) }),
            login: (credentials) => apiCall('/users/login', { method: 'POST', body: JSON.stringify(credentials) }),
            getProfile: () => apiCall('/users/me'),
            updateProfile: (updates) => apiCall('/users/me', { method: 'PUT', body: JSON.stringify(updates) }),
            getAllUsers: () => apiCall('/users'),
            markNotificationsRead: () => apiCall('/users/notifications/read', { method: 'PUT' })
        },
        upload: {
            photo: async (file) => {
                const formData = new FormData();
                formData.append('photo', file);
                return apiCall('/upload/photo', { method: 'POST', body: formData });
            },
            photos: async (files) => {
                const formData = new FormData();
                files.forEach(file => formData.append('photos', file));
                return apiCall('/upload/photos', { method: 'POST', body: formData });
            }
        },
        issues: {
            create: (issueData) => apiCall('/issues', { method: 'POST', body: JSON.stringify(issueData) }),
            checkDuplicate: (issueData) => apiCall('/issues/check-duplicate', { method: 'POST', body: JSON.stringify(issueData) }),
            support: (id) => apiCall(`/issues/${id}/support`, { method: 'POST' }),
            report: (id, reportData) => apiCall(`/issues/${id}/report`, { method: 'POST', body: JSON.stringify(reportData) }),
            getAll: (filters = {}) => {
                const queryString = new URLSearchParams(filters).toString();
                return apiCall(`/issues${queryString ? `?${queryString}` : ''}`);
            },
            getById: (id) => apiCall(`/issues/${id}`),
            updateStatus: (id, status) => apiCall(`/issues/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) }),
            vote: (id, voteType = 'upvote') => apiCall(`/issues/${id}/vote`, { method: 'POST', body: JSON.stringify({ voteType }) }),
            addComment: (id, text) => apiCall(`/issues/${id}/comments`, { method: 'POST', body: JSON.stringify({ text }) })
        },
        analytics: {
            getData: () => apiCall('/analytics')
        }
    };

    const appState = {
        currentUser: null,
        users: [],
        issues: [],
        issueCategories: ["Roads", "Electricity", "Water Supply", "Sanitation", "Public Safety", "Other"],
        currentLanguage: 'en',
        map: null,
        charts: {},
        uploadedPhotos: [],
        // NEW: Voice recognition state
        recognition: null,
        isRecording: false,
        finalTranscript: ''
    };

    const DOMElements = {

        sidebar: document.querySelector('.sidebar'),
        navLinks: document.querySelectorAll('nav a'),
        views: document.querySelectorAll('.view'),
        modalContainer: document.getElementById('modalContainer'),

        menuToggle: document.querySelector('.menu-toggle'),
        mobileOverlay: document.querySelector('.mobile-overlay'),
        darkModeBtn: document.getElementById('darkModeBtn'),
        languageBtn: document.getElementById('languageBtn'),
        languageDropdown: document.getElementById('languageDropdown'),
        // NEW: Voice report button
        voiceReportBtn: document.getElementById('voiceReportBtn')
    };
    
    const translations = {
        en: { appName: "CivicPulse", dashboard: "Dashboard", myReports: "My Reports", issueMap: "Issue Map", champions: "Champions", analytics: "Analytics", settings: "Settings", civicScore: "Civic Score", reportNewIssue: "Report New Issue", priorityIssues: "Priority Issues", recentIssues: "Recent Issues", themeSettings: "Appearance Settings", themeColor: "Theme Color", fontSize: "Font Size", fontStyle: "Font Style", notificationSettings: "Notification Settings", settingNewIssue: "New issue in my area", settingStatusUpdate: "Status update on my reports", settingDataSaver: "Data Saver Mode" },
        hi: { appName: "सिविकपल्स", dashboard: "डैशबोर्ड", myReports: "मेरी रिपोर्ट", issueMap: "समस्या मानचित्र", champions: "चैंपियन", analytics: "विश्लेषिकी", settings: "समायोजन", civicScore: "सिविक स्कोर", reportNewIssue: "नई समस्या की रिपोर्ट करें", priorityIssues: "प्राथमिकता वाले मुद्दे", recentIssues: "हाल के मुद्दे" },
        ta: { appName: "சிவிக்பல்ஸ்", dashboard: "டாஷ்போர்ட்", myReports: "எனது அறிக்கைகள்", issueMap: "பிரச்சனை வரைபடம்", champions: "சாம்பியன்கள்", analytics: "பகுப்பாய்வு", settings: "அமைப்புகள்", civicScore: "சிவிக் ஸ்கோர்", reportNewIssue: "புதிய சிக்கலை புகாரளி" },
        te: { appName: "సివిక్‌పల్స్", dashboard: "డాష్‌బోర్డ్", myReports: "నా నివేదికలు", issueMap: "సమస్య మ్యాప్", champions: "ఛాంపియన్‌లు", analytics: "విశ్లేషణలు", settings: "సెట్టింగ్‌లు", civicScore: "సివిక్ స్కోర్", reportNewIssue: "కొత్త సమస్యను నివేదించండి" },
        ml: { appName: "സിവിക് പൾസ്", dashboard: "ഡാഷ്ബോർഡ്", myReports: "എന്റെ റിപ്പോർട്ടുകൾ", issueMap: "പ്രശ്ന ഭൂപടം", champions: "ചാമ്പ്യന്മാർ", analytics: "അനലിറ്റിക്സ്", settings: "ക്രമീകരണങ്ങൾ", civicScore: "സിവിക് സ്കോർ", reportNewIssue: "പുതിയ പ്രശ്നം റിപ്പോർട്ട് ചെയ്യുക" },
        bn: { appName: "সিভিকপালস", dashboard: "ড্যাশবোর্ড", myReports: "আমার প্রতিবেদন", issueMap: "সমস্যা মানচিত্র", champions: "চ্যাম্পিয়নস", analytics: "বিশ্লেষণ", settings: "সেটিংস", civicScore: "সিভিক স্কোর", reportNewIssue: "নতুন সমস্যা প্রতিবেদন করুন" }
    };

    const translateUI = () => {
        const lang = appState.currentLanguage;
        document.querySelectorAll('[data-translate-key]').forEach(el => {
            const key = el.dataset.translateKey;
            if (translations[lang] && translations[lang][key]) {
                el.textContent = translations[lang][key];
            } else if (translations['en'] && translations['en'][key]) {
                el.textContent = translations['en'][key]; // Fallback to English
            }
        });
        document.documentElement.lang = lang.split('-')[0];
    };

    const showToast = (message, type = 'info') => {
        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-times-circle' : 'fa-info-circle'}"></i> ${message}`;
        DOMElements.toastContainer.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 500);
        }, 4000);
    };

    const openModal = (modalHTML) => {
        DOMElements.modalContainer.innerHTML = modalHTML;
        const overlay = DOMElements.modalContainer.querySelector('.modal-overlay');
        setTimeout(() => overlay?.classList.add('visible'), 10);
    };

    const closeModal = () => {
        const overlay = DOMElements.modalContainer.querySelector('.modal-overlay');
        if (overlay) {
            overlay.classList.remove('visible');
            setTimeout(() => DOMElements.modalContainer.innerHTML = '', 400);
        }
    };
    
    // --- NEW: Voice Recognition Functions ---

    const openVoiceReportModal = () => {
        const languageOptions = `
            <option value="en-US">English (US)</option>
            <option value="en-IN">English (India)</option>
            <option value="hi-IN">हिंदी (Hindi)</option>
            <option value="ta-IN">தமிழ் (Tamil)</option>
            <option value="te-IN">తెలుగు (Telugu)</option>
            <option value="ml-IN">മലയാളം (Malayalam)</option>
            <option value="kn-IN">ಕನ್ನಡ (Kannada)</option>
            <option value="bn-IN">বাংলা (Bengali)</option>
            <option value="gu-IN">ગુજરાતી (Gujarati)</option>
            <option value="mr-IN">मराठी (Marathi)</option>
        `;
        const modalHTML = `
            <div class="modal-overlay">
                <div class="modal-content voice-modal-content" style="max-width: 500px;">
                    <button class="modal-close-btn">&times;</button>
                    <h3><i class="fas fa-microphone-alt"></i> Report with your Voice</h3>
                    <p>Select your language and describe the issue. We'll draft the report for you.</p>
                    <div class="form-group">
                        <label for="voiceLanguage">Language</label>
                        <select id="voiceLanguage">${languageOptions}</select>
                    </div>
                    <div class="voice-controls">
                        <button id="startRecording" class="voice-btn"><i class="fas fa-microphone"></i> Start</button>
                        <button id="stopRecording" class="voice-btn" disabled><i class="fas fa-stop"></i> Stop</button>
                    </div>
                    <div class="voice-status" id="voiceStatus">Ready to record...</div>
                </div>
            </div>
        `;
        openModal(modalHTML);

        // Set up listeners for the new modal
        const startBtn = document.getElementById('startRecording');
        const stopBtn = document.getElementById('stopRecording');
        const langSelect = document.getElementById('voiceLanguage');

        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecording);
        langSelect.addEventListener('change', (e) => initVoiceRecognition(e.target.value));

        // Initialize for the default selected language
        initVoiceRecognition(langSelect.value);
    };

    const initVoiceRecognition = (lang) => {
        if (appState.recognition) {
            appState.recognition.stop();
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showToast('Speech recognition not supported in this browser.', 'error');
            closeModal();
            return;
        }

        appState.recognition = new SpeechRecognition();
        appState.recognition.lang = lang;
        appState.recognition.continuous = true;
        appState.recognition.interimResults = true;
        appState.finalTranscript = '';

        appState.recognition.onstart = () => {
            appState.isRecording = true;
            document.getElementById('startRecording').classList.add('recording');
            document.getElementById('startRecording').disabled = true;
            document.getElementById('stopRecording').disabled = false;
            document.getElementById('voiceStatus').textContent = 'Listening...';
        };

        appState.recognition.onend = () => {
            appState.isRecording = false;
            const startBtn = document.getElementById('startRecording');
            const stopBtn = document.getElementById('stopRecording');
            if (startBtn) {
                startBtn.classList.remove('recording');
                startBtn.disabled = false;
            }
            if (stopBtn) {
                 stopBtn.disabled = true;
            }
            const status = document.getElementById('voiceStatus');
            if(status) status.textContent = 'Processing...';

            // Automatically open report form with transcript
            setTimeout(() => {
                closeModal();
                if (appState.finalTranscript.trim()) {
                    openReportModal();
                    setTimeout(() => {
                        const descriptionField = document.getElementById('issueDescription');
                        if (descriptionField) {
                            descriptionField.value = appState.finalTranscript;
                        }
                    }, 200);
                } else {
                     showToast('No speech was detected.', 'warning');
                }
            }, 1000);
        };

        appState.recognition.onresult = (event) => {
            let interim_transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    appState.finalTranscript += event.results[i][0].transcript;
                } else {
                    interim_transcript += event.results[i][0].transcript;
                }
            }
            document.getElementById('voiceStatus').textContent = interim_transcript;
        };

        appState.recognition.onerror = (event) => {
            showToast(`Speech recognition error: ${event.error}`, 'error');
            console.error('Speech Recognition Error', event);
            stopRecording();
        };
    };

    const startRecording = () => {
        if (appState.recognition && !appState.isRecording) {
            appState.recognition.start();
        }
    };

    const stopRecording = () => {
        if (appState.recognition && appState.isRecording) {
            appState.recognition.stop();
        }
    };

                            <p class="location"><i class="fas fa-map-marker-alt"></i> ${existingIssue.location}</p>
                            <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 0.5rem;">${existingIssue.description}</p>
                            
                            <div class="similarity-metrics">
                                <div class="metric">
                                    <div style="font-size: 1.2em; color: var(--primary-color);">${distance}m</div>
                                    <div>Distance</div>
                                </div>
                                <div class="metric">
                                    <div style="font-size: 1.2em; color: var(--primary-color);">${similarities.title}%</div>
                                    <div>Title Match</div>
                                </div>
                                <div class="metric">
                                    <div style="font-size: 1.2em; color: var(--primary-color);">${similarities.keywords}%</div>
                                    <div>Keyword Match</div>
                                </div>
                                <div class="metric">
                                    <div style="font-size: 1.2em; color: var(--primary-color);">${existingIssue.upvotes}</div>

                    <div class="duplicate-actions">

        DOMElements.modalContainer.innerHTML = modalHTML;

        const duplicateModal = DOMElements.modalContainer.querySelector('.duplicate-modal');
        const supportBtn = duplicateModal.querySelector('.duplicate-support');
        const createBtn = duplicateModal.querySelector('.duplicate-create');
        const closeBtn = duplicateModal.querySelector('.duplicate-close');

        supportBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();
            
            supportBtn.disabled = true;
            supportBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Supporting...';
            
            try {
                await API.issues.support(existingIssue.id);
                DOMElements.modalContainer.innerHTML = '';
                showToast('Successfully supported existing issue!', 'success');
                await refreshDashboard();
                await loadUserProfile();

                supportBtn.disabled = false;
                supportBtn.innerHTML = '<i class="fas fa-handshake"></i> Support Existing Issue';
                showToast(error.message, 'error');
