        createBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();
            
            createBtn.disabled = true;
            createBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            
            try {
                window.pendingIssueData.ignoreDuplicate = true;
                await API.issues.create(window.pendingIssueData);
                DOMElements.modalContainer.innerHTML = '';
                showToast('Report submitted successfully!', 'success');
                await refreshDashboard();
                await loadUserProfile();
            } catch (error) {
                createBtn.disabled = false;
                createBtn.innerHTML = '<i class="fas fa-plus"></i> Create New Report Anyway';
                showToast(error.message, 'error');
            }
        });
        
        closeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();
            DOMElements.modalContainer.innerHTML = '';
        });
        
        duplicateModal.querySelector('.modal-content').addEventListener('click', (e) => {
            e.stopPropagation();
        });
        
        duplicateModal.addEventListener('click', (e) => {
            if (e.target === duplicateModal) {
                // Optional: close on overlay click
            }
        });
        
        setTimeout(() => {
            duplicateModal.classList.add('visible');
        }, 10);
    };

    // Photo upload functionality
    const handlePhotoUpload = (files) => {
        const promises = Array.from(files).map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve({ file, dataUrl: e.target.result });
                reader.readAsDataURL(file);
            });
        });
        
        return Promise.all(promises);
    };

    const createImageGallery = (images, issueId) => {
        if (!images || images.length === 0) {
            return `<img src="https://placehold.co/600x400/cccccc/000000?text=New+Report" alt="No Image" class="card-image">`;
        }
        
        if (images.length === 1) {
            return `<img src="${images[0]}" alt="Issue Image" class="card-image">`;
        }
        
        const mainImage = images[0];
        const thumbnails = images.slice(1, 4).map((img, index) => 
            `<img src="${img}" alt="Thumbnail ${index + 1}" class="thumbnail" data-index="${index + 1}" onclick="switchImage('${issueId}', ${index + 1})">`
        ).join('');
        
        const extraCount = images.length > 4 ? `+${images.length - 4}` : '';
        
        return `
            <div class="image-gallery" data-issue-id="${issueId}">
                ${images.length > 1 ? `<div class="image-count-badge">${images.length} photos</div>` : ''}
                <img src="${mainImage}" alt="Main Issue Image" class="main-image" id="main-image-${issueId}">
                ${images.length > 1 ? `
                    <div class="thumbnail-row">
                        <img src="${mainImage}" alt="Thumbnail 0" class="thumbnail active" data-index="0" onclick="switchImage('${issueId}', 0)">
                        ${thumbnails}
                        ${extraCount ? `<div class="thumbnail" style="display:flex;align-items:center;justify-content:center;background:var(--border-color);color:var(--text-color);font-weight:bold;">${extraCount}</div>` : ''}
                    </div>
                ` : ''}
            </div>
        `;
    };

    // Global function for switching images
    window.switchImage = (issueId, index) => {
        const gallery = document.querySelector(`[data-issue-id="${issueId}"]`);
        if (!gallery) return;
        
        const issue = appState.issues.find(i => (i._id || i.id) == issueId);
        if (!issue || !issue.images) return;
        
        const mainImage = gallery.querySelector('.main-image');
        const thumbnails = gallery.querySelectorAll('.thumbnail');
        
        mainImage.src = issue.images[index];
        thumbnails.forEach((thumb, i) => {
            thumb.classList.toggle('active', i === index);
        });
    };

    const loadUsers = async () => {
        try {
            appState.users = await API.users.getAllUsers();
        } catch (error) {
            console.error('Error loading users:', error);
        }
    };

    const loadIssues = async (filters = {}) => {
        try {
            appState.issues = await API.issues.getAll(filters);
            return appState.issues;
        } catch (error) {
            console.error('Error loading issues:', error);
            return [];
        }
    };

    const loadUserProfile = async () => {
        try {
            appState.currentUser = await API.users.getProfile();
            updateUIWithUser();
        } catch (error) {
            console.error('Error loading profile:', error);
            logout();
        }
    };

    const updateUIWithUser = () => {
        if (!appState.currentUser) return;
        document.querySelector('.profile .name').textContent = appState.currentUser.name;
        document.querySelector('.profile .score').textContent = `Civic Score: ${appState.currentUser.score}`;
        document.querySelector('.profile img').src = appState.currentUser.avatar;
        updateNotifications();
    };

    const updateNotifications = () => {
        if (!appState.currentUser) return;
        const unreadCount = appState.currentUser.notifications.filter(n => !n.read).length;
        DOMElements.notificationsBadge.textContent = unreadCount;
        DOMElements.notificationsBadge.style.display = unreadCount > 0 ? 'flex' : 'none';
        DOMElements.notificationsDropdown.innerHTML = appState.currentUser.notifications
            .map(n => `<div class="dropdown-item ${n.read ? '' : 'unread'}">${n.text}</div>`)
            .join('') || '<div class="dropdown-item">No notifications</div>';
    };

    const renderIssuesGrid = (targetSelector, issuesToRender) => {
        const grid = document.querySelector(targetSelector);
        if (!grid) return;
        if (issuesToRender.length === 0) {
            grid.innerHTML = '<p style="color: var(--text-light);">No issues found.</p>';
            return;
        }
        grid.innerHTML = issuesToRender.map(issue => {
            const issueId = issue._id || issue.id;
            const userVote = appState.currentUser && issue.voted_by ? 
                issue.voted_by.find(vote => vote.userId === (appState.currentUser.id || appState.currentUser._id)) : null;
            const isUpvoted = userVote && userVote.type === 'upvote';
            const isDownvoted = userVote && userVote.type === 'downvote';
            const supporterCount = issue.supporterCount || 0;
            const reportCount = issue.reportCount || 0;
            
            return `
            <div class="issue-card" data-issue-id="${issueId}">
                ${createImageGallery(issue.images || [issue.image].filter(Boolean), issueId)}
                <div class="card-content">
                    <h3>${issue.title}</h3>
                    <p class="location"><i class="fas fa-map-marker-alt"></i> ${issue.location}</p>
                    ${supporterCount > 0 ? `<p style="color: var(--secondary-color); font-size: 0.85rem; margin-top: 0.5rem;"><i class="fas fa-users"></i> ${supporterCount} additional supporters</p>` : ''}
                    ${reportCount > 0 ? `<p style="color: var(--danger-color); font-size: 0.85rem; margin-top: 0.25rem;"><i class="fas fa-flag"></i> ${reportCount} spam reports</p>` : ''}
                </div>
                <div class="card-footer">
                    <span class="status-pill ${issue.status.toLowerCase().replace(' ', '-')}">${issue.status}</span>
                    <div class="card-actions">
                        <button class="upvote-btn ${isUpvoted ? 'voted' : ''}" data-issue-id="${issueId}" data-vote-type="upvote" onclick="event.stopPropagation();">
                            <i class="fas fa-arrow-up"></i> <span class="count">${issue.upvotes}</span>
                        </button>
                        ${issue.downvotes > 0 ? `
                            <button class="upvote-btn ${isDownvoted ? 'voted' : ''}" data-issue-id="${issueId}" data-vote-type="downvote" onclick="event.stopPropagation();" style="background: rgba(239, 68, 68, 0.1); color: var(--danger-color);">
                                <i class="fas fa-arrow-down"></i> <span class="count">${issue.downvotes}</span>
                            </button>
                        ` : ''}
                        ${issue.status !== 'Spam' && appState.currentUser && issue.reporter_id !== (appState.currentUser.id || appState.currentUser._id) ? `
                            <button class="report-btn" data-issue-id="${issueId}" onclick="event.stopPropagation();" title="Report as spam">
                                <i class="fas fa-flag"></i>
                            </button>
                        ` : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    };

    const openReportSpamModal = (issueId) => {
        const issue = appState.issues.find(i => (i._id || i.id) == issueId);
        if (!issue) return;

        const modalHTML = `
            <div class="modal-overlay">
                <div class="modal-content" style="max-width: 500px;">
                    <button class="modal-close-btn">&times;</button>
                    <h2><i class="fas fa-flag" style="color: var(--danger-color);"></i> Report Issue</h2>
                    
                    <div class="report-issue-modal">
                        <p><strong>Issue:</strong> ${issue.title}</p>
                        <p><strong>Location:</strong> ${issue.location}</p>
                    </div>
                    
                    <form id="reportSpamForm">
                        <div class="form-group">
                            <label for="reportReason">Reason for reporting:</label>
                            <select id="reportReason" required>
                                <option value="">Select a reason...</option>
                                <option value="spam">Spam or irrelevant content</option>
                                <option value="duplicate">Duplicate report</option>
                                <option value="false">False or misleading information</option>
                                <option value="inappropriate">Inappropriate content</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="reportDetails">Additional details (optional):</label>
                            <textarea id="reportDetails" rows="3" placeholder="Provide more context about why you're reporting this issue..."></textarea>
                        </div>
                        <div style="display: flex; gap: 1rem;">
                            <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
                            <button type="submit" class="btn danger" data-issue-id="${issueId}">Submit Report</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
        
        openModal(modalHTML);
    };

    const refreshDashboard = async () => {
        await loadIssues();
        const statsContainer = document.getElementById('dashboardStats');
        const totalReports = appState.issues.filter(i => i.status !== 'Spam' && i.status !== 'Removed').length;
        const inProgress = appState.issues.filter(i => i.status === 'In Progress').length;
        const resolvedIssues = appState.issues.filter(i => i.status === 'Resolved').length;
        const spamIssues = appState.issues.filter(i => i.status === 'Spam').length;
        
        statsContainer.innerHTML = `
            <div class="stat-card clickable" data-filter="all">
                <div class="stat-header">
                    <div class="stat-icon reports"><i class="fas fa-bullhorn"></i></div>
                    <div><div class="stat-title">Total Reports</div><div class="stat-value">${totalReports}</div></div>
                </div>
            </div>
            <div class="stat-card clickable" data-filter="In Progress">
                <div class="stat-header">
                    <div class="stat-icon progress"><i class="fas fa-cogs"></i></div>
                    <div><div class="stat-title">In Progress</div><div class="stat-value">${inProgress}</div></div>
                </div>
            </div>
            <div class="stat-card clickable" data-filter="Resolved">
                <div class="stat-header">
                    <div class="stat-icon resolved"><i class="fas fa-check-circle"></i></div>
                    <div><div class="stat-title">Resolved</div><div class="stat-value">${resolvedIssues}</div></div>
                </div>
            </div>
            ${spamIssues > 0 ? `
                <div class="stat-card clickable" data-filter="Spam">
                    <div class="stat-header">
                        <div class="stat-icon spam"><i class="fas fa-ban"></i></div>
                        <div><div class="stat-title">Spam Filtered</div><div class="stat-value">${spamIssues}</div></div>
                    </div>
                </div>
            ` : ''}`;

        const priorityIssues = [...appState.issues]
            .filter(i => i.status !== 'Spam' && i.status !== 'Removed')
            .sort((a, b) => b.upvotes - a.upvotes)
            .slice(0, 6);
        renderIssuesGrid('#priorityIssuesGrid', priorityIssues);
        
        const recentIssues = [...appState.issues]
            .filter(i => i.status !== 'Spam' && i.status !== 'Removed')
            .sort((a, b) => new Date(b.createdAt || b.created_at) - new Date(a.createdAt || a.created_at))
            .slice(0, 6);
        renderIssuesGrid('#recentIssuesGrid', recentIssues);
    };

    const openIssueListModal = (issues, title) => {
        openModal(`
            <div class="modal-overlay">
                <div class="modal-content" style="max-width: 900px;">
                    <button class="modal-close-btn">&times;</button>
                    <h2>${title}</h2>
                    <div class="issues-grid" style="margin-top: 1.5rem; max-height: 70vh; overflow-y: auto;">
                        ${issues.length > 0 ? issues.map(issue => {
                            const supporterCount = issue.supporterCount || 0;
                            const reportCount = issue.reportCount || 0;
                            const issueId = issue._id || issue.id;
                            return `
                            <div class="issue-card" data-issue-id="${issueId}">
                                ${createImageGallery(issue.images || [issue.image].filter(Boolean), issueId)}
                                <div class="card-content">
                                    <h3>${issue.title}</h3>
                                    <p class="location"><i class="fas fa-map-marker-alt"></i> ${issue.location}</p>
                                    ${supporterCount > 0 ? `<p style="color: var(--secondary-color); font-size: 0.85rem; margin-top: 0.5rem;"><i class="fas fa-users"></i> ${supporterCount} supporters</p>` : ''}
                                    ${reportCount > 0 ? `<p style="color: var(--danger-color); font-size: 0.85rem; margin-top: 0.25rem;"><i class="fas fa-flag"></i> ${reportCount} reports</p>` : ''}
                                </div>
                                <div class="card-footer">
                                    <span class="status-pill ${issue.status.toLowerCase().replace(' ', '-')}">${issue.status}</span>
                                    <span class="upvote-btn" style="pointer-events: none;"><i class="fas fa-arrow-up"></i> ${issue.upvotes}</span>
                                </div>
                            </div>`;
                        }).join('') : '<p>No issues to display.</p>'}
                    </div>
                </div>
            </div>`);
    };

    const initAnalyticsCharts = async () => {
        const categoryCtx = document.getElementById('issuesByCategoryChart')?.getContext('2d');
        const timeCtx = document.getElementById('issuesOverTimeChart')?.getContext('2d');
        if (!categoryCtx || !timeCtx) return;

        try {
            const analytics = await API.analytics.getData();
            
            if (appState.charts.category) appState.charts.category.destroy();
            appState.charts.category = new Chart(categoryCtx, {
                type: 'doughnut',
                data: {
                    labels: analytics.byCategory.map(c => c._id),
                    datasets: [{
                        data: analytics.byCategory.map(c => c.count),
                        backgroundColor: ['#f59e0b', '#f97316', '#ef4444', '#64748b', '#4f46e5', '#10b981'],
                        borderColor: 'var(--card-background)',
                        borderWidth: 4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
            });

            if (appState.charts.time) appState.charts.time.destroy();
            appState.charts.time = new Chart(timeCtx, {
                type: 'line',
                data: {
                    labels: analytics.timeline.map(t => t._id),
                    datasets: [{
                        label: 'Issues Reported',
                        data: analytics.timeline.map(t => t.count),
                        borderColor: 'var(--primary-color)',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        tension: 0.2,
                        fill: true
                    }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        } catch (error) {
            console.error('Error loading analytics:', error);
        }
    };

    const renderMapView = async () => {
        const mapContainer = document.getElementById('map');
        if (!mapContainer || mapContainer.offsetParent === null) return;
        if (appState.map) appState.map.remove();
        
        await loadIssues();
        
        appState.map = L.map(mapContainer).setView([12.8585, 80.1800], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(appState.map);
        
        const validIssues = appState.issues.filter(i => i.status !== 'Spam' && i.status !== 'Removed');
        const heatPoints = validIssues.map(i => [i.coordinates?.lat || i.lat, i.coordinates?.lng || i.lng, i.coordinates?.intensity || i.intensity || 10]);
        
        if (heatPoints.length > 0) {
            L.heatLayer(heatPoints, { radius: 25, blur: 15, maxZoom: 17 }).addTo(appState.map);
        }

        validIssues.forEach(issue => {
            const lat = issue.coordinates?.lat || issue.lat;
            const lng = issue.coordinates?.lng || issue.lng;
            if (lat && lng) {
                const markerColor = issue.status === 'Resolved' ? 'green' : 
                                  issue.status === 'In Progress' ? 'orange' : 'red';
                L.marker([lat, lng]).addTo(appState.map)
                    .bindPopup(`<b>${issue.title}</b><br>${issue.location}<br>Status: ${issue.status}<br>Upvotes: ${issue.upvotes}`)
                    .on('click', () => openIssueDetailModal(issue._id || issue.id));
            }
        });
    };

    const showView = async (viewId) => {
        DOMElements.views.forEach(v => v.classList.remove('active'));
        document.getElementById(viewId)?.classList.add('active');
        DOMElements.navLinks.forEach(l => l.classList.remove('active'));
        document.querySelector(`nav a[data-view="${viewId}"]`)?.classList.add('active');
        
        if (viewId === 'dashboardView') {
            await refreshDashboard();
        } else if (viewId === 'myReportsView') {
            const myIssues = await loadIssues({ reporterId: appState.currentUser._id || appState.currentUser.id });
            renderIssuesGrid('#myReportsView .issues-grid', myIssues);
        } else if (viewId === 'mapView') {
            setTimeout(renderMapView, 10);
        } else if (viewId === 'leaderboardView') {
            await loadUsers();
            const list = document.querySelector('.leaderboard-list');
            list.innerHTML = appState.users.map((user, index) => `
                <div class="stat-card clickable leaderboard-item" data-user-id="${user._id || user.id}" style="display:flex; align-items:center; gap:1rem; padding:1rem; margin-bottom:1rem;">
                    <span style="font-weight:800; font-size:1.2rem; width:40px; color:var(--text-light);">#${index+1}</span>
                    <img src="${user.avatar}" style="width:50px; height:50px; border-radius:50%;">
                    <div style="flex-grow:1;">
                        <div style="font-weight:600;">${user.name}</div>
                        <div style="color:var(--text-light); font-size:0.875rem;">${user.email}</div>
                    </div>
                    <div style="font-weight:700; color:var(--primary-color);">${user.score.toLocaleString()} pts</div>
                </div>`).join('');
        } else if (viewId === 'analyticsView') {
            await initAnalyticsCharts();
        } else if (viewId === 'settingsView') {
            // Initialize theme selector
            const themeSelector = document.getElementById('themeSelector');
            const themes = { default: '#4f46e5', rose: '#db2777', forest: '#16a34a', sunset: '#d97706' };
            themeSelector.innerHTML = '';
            Object.keys(themes).forEach(themeKey => {
                const themeOption = document.createElement('div');
                themeOption.className = `theme-option ${themeKey === 'default' ? 'active' : ''}`;
                themeOption.style.backgroundColor = themes[themeKey];
                themeOption.dataset.theme = themeKey;
                themeSelector.appendChild(themeOption);
            });
        }
    };

    const openReportModal = () => {
        const categoryOptions = appState.issueCategories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        openModal(`
            <div class="modal-overlay"><div class="modal-content" style="max-width: 700px;">
                <button class="modal-close-btn">&times;</button><h2><i class="fas fa-camera"></i> Report New Issue</h2>
                <form id="reportForm">
                    <div class="form-group"><label for="issueTitle">Title</label><input type="text" id="issueTitle" required placeholder="Brief description of the issue"></div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group"><label for="issueCategory">Category</label><select id="issueCategory" required>${categoryOptions}</select></div>
                        <div class="form-group"><label for="issueLocation">Location</label><input type="text" id="issueLocation" required placeholder="Street address or landmark"></div>
                    </div>
                    <div class="form-group"><label for="issueDescription">Description</label><textarea id="issueDescription" rows="3" required placeholder="Provide detailed information about the issue..."></textarea></div>
                    
                    <div class="form-group">
                        <label>Photos (Upload up to 5 photos)</label>
                        <div class="photo-upload-area" id="photoUploadArea">
                            <i class="fas fa-camera" style="font-size: 2rem; color: var(--text-light); margin-bottom: 1rem;"></i>
                            <p>Click to upload photos or drag and drop here</p>
                            <p style="font-size: 0.875rem; color: var(--text-light);">Supported formats: JPG, PNG, GIF, WebP (Max: 10MB each)</p>
                            <input type="file" id="photoInput" multiple accept="image/*" style="display: none;">
                        </div>
                        <div class="upload-preview" id="uploadPreview"></div>
                    </div>
                    
                    <div class="form-group"><label>Location (Click on map to set exact location)</label><div id="reportMap" style="height:200px; border-radius:0.5rem;"></div></div>
                    <input type="hidden" id="issueLat" value="12.8585">
                    <input type="hidden" id="issueLng" value="80.1800">
                    
                    <button type="submit" class="report-button" style="width:100%; justify-content:center;">
                        <i class="fas fa-paper-plane"></i> Submit Report
                    </button>
                </form>
            </div></div>`);

        const photoUploadArea = document.getElementById('photoUploadArea');
        const photoInput = document.getElementById('photoInput');
        const uploadPreview = document.getElementById('uploadPreview');
        
        appState.uploadedPhotos = [];

        photoUploadArea.addEventListener('click', () => photoInput.click());
        
        photoUploadArea.addEventListener('dragover', (e) => { e.preventDefault(); photoUploadArea.classList.add('drag-over'); });
        photoUploadArea.addEventListener('dragleave', () => photoUploadArea.classList.remove('drag-over'));
        
        photoUploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            photoUploadArea.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(file => file.type.startsWith('image/'));
            handlePhotoSelection(files);
        });
        
        photoInput.addEventListener('change', (e) => handlePhotoSelection(Array.from(e.target.files)));

        const handlePhotoSelection = async (files) => {
            if (appState.uploadedPhotos.length + files.length > 5) {
                showToast('Maximum 5 photos allowed', 'error');
                return;
            }
            
            for (const file of files) {
                if (file.size > 10 * 1024 * 1024) {
                    showToast(`File ${file.name} is too large. Max 10MB.`, 'error');
                    continue;
                }
                
                try {
                    const uploadResult = await API.upload.photo(file);
                    appState.uploadedPhotos.push(uploadResult.photoUrl);
                    
                    const previewItem = document.createElement('div');
                    previewItem.className = 'preview-item';
                    previewItem.innerHTML = `<img src="${uploadResult.photoUrl}" alt="Preview" class="preview-image"><button type="button" class="remove-btn" data-url="${uploadResult.photoUrl}">&times;</button>`;
                    uploadPreview.appendChild(previewItem);
                } catch (error) {
                    showToast(`Failed to upload ${file.name}: ${error.message}`, 'error');
                }
            }
        };
        
        uploadPreview.addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-btn')) {
                const url = e.target.dataset.url;
                appState.uploadedPhotos = appState.uploadedPhotos.filter(photo => photo !== url);
                e.target.parentElement.remove();
            }
        });

        setTimeout(() => {
            const reportMap = L.map('reportMap').setView([12.8585, 80.1800], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(reportMap);
            let marker = L.marker([12.8585, 80.1800], { draggable: true }).addTo(reportMap);
            
            marker.on('dragend', function(e) {
                const pos = marker.getLatLng();
                document.getElementById('issueLat').value = pos.lat;
                document.getElementById('issueLng').value = pos.lng;
            });

            reportMap.on('click', function(e) {
                marker.setLatLng(e.latlng);
                document.getElementById('issueLat').value = e.latlng.lat;
                document.getElementById('issueLng').value = e.latlng.lng;
            });
        }, 100);
    };

    const openIssueDetailModal = async (issueId) => {
        try {
            const issue = await API.issues.getById(issueId);
            
            const renderComments = (comments) => comments.map(c => `
                <div class="comment" style="display:flex; gap:10px; margin-bottom:1rem;">
                    <img src="${c.userId.avatar}" alt="${c.userId.name}" style="width:40px; height:40px; border-radius:50%;">
                    <div class="comment-body"><strong>${c.userId.name}:</strong><p>${c.text}</p></div>
                </div>`).join('') || '<p id="no-comments-msg">No comments yet.</p>';

            const renderSupporters = (supporters) => supporters.length > 0 ? `<div style="margin-top: 1rem;"><h5 style="margin-bottom: 0.5rem;">Additional Supporters (${supporters.length})</h5><div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">${supporters.map(s => `<img src="${s.avatar}" alt="${s.name}" title="${s.name}" style="width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--secondary-color);">`).join('')}</div></div>` : '';
            const renderReports = (reports) => reports.length > 0 ? `<div style="margin-top: 1rem; padding: 1rem; background: rgba(239, 68, 68, 0.05); border-radius: 0.5rem;"><h5 style="color: var(--danger-color); margin-bottom: 0.5rem;"><i class="fas fa-flag"></i> Spam Reports (${reports.length})</h5>${reports.slice(0, 3).map(r => `<div style="margin-bottom: 0.5rem; font-size: 0.875rem;"><strong>${r.reason}</strong>${r.details ? `<br><em>${r.details}</em>` : ''}</div>`).join('')}</div>` : '';
            
            const images = issue.images && issue.images.length > 0 ? issue.images : [issue.image].filter(Boolean);
            const imageGallery = images.length > 0 ? `<div style="margin-bottom: 1rem;"><img src="${images[0]}" style="width:100%; border-radius:0.5rem; margin-bottom: 0.5rem;" id="modalMainImage">${images.length > 1 ? `<div style="display: flex; gap: 0.5rem; overflow-x: auto;">${images.map((img, idx) => `<img src="${img}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 0.25rem; cursor: pointer; border: 2px solid ${idx === 0 ? 'var(--primary-color)' : 'transparent'};" onclick="switchModalImage(${idx}, this)" data-src="${img}">`).join('')}</div>` : ''}</div>` : '';
            
            openModal(`
                <div class="modal-overlay">
                    <div class="modal-content" style="max-width: 900px;">
                        <button class="modal-close-btn">&times;</button><h2>${issue.title}</h2>
                        <p class="location"><i class="fas fa-map-marker-alt"></i> ${issue.location}</p>
                        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 2rem; margin-top: 1rem;">
                            <div>${imageGallery}<p><strong>Description:</strong></p><p>${issue.description}</p><div style="margin-top: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; font-size: 0.875rem;"><span><i class="fas fa-user"></i> ${issue.reporterId.name}</span><span><i class="fas fa-calendar"></i> ${new Date(issue.created_at).toLocaleDateString()}</span><span><i class="fas fa-thumbs-up"></i> ${issue.upvotes} upvotes</span>${issue.downvotes > 0 ? `<span><i class="fas fa-thumbs-down"></i> ${issue.downvotes} downvotes</span>` : ''}<span class="status-pill ${issue.status.toLowerCase().replace(' ', '-')}">${issue.status}</span></div>${renderSupporters(issue.supporters || [])}${issue.reportCount > 0 ? renderReports(issue.reports || []) : ''}</div>
                            <div class="comments-section"><h4>Comments</h4><div id="commentsFeed" style="max-height: 300px; overflow-y: auto;">${renderComments(issue.comments)}</div><form id="commentForm" data-issue-id="${issue._id}" style="display:flex; gap:10px; margin-top:1rem;"><input type="text" id="commentInput" placeholder="Add a comment..." style="flex-grow:1; background: var(--background-color); border: 1px solid var(--border-color); border-radius: 0.5rem; padding: 0.75rem;" required><button type="submit" class="btn"><i class="fas fa-paper-plane"></i></button></form></div>
                        </div>
                    </div>
                </div>`);

            window.switchModalImage = (index, element) => {
                const mainImage = document.getElementById('modalMainImage');
                const thumbnails = element.parentElement.querySelectorAll('img');
                mainImage.src = element.dataset.src;
                thumbnails.forEach((thumb, idx) => thumb.style.border = idx === index ? '2px solid var(--primary-color)' : '2px solid transparent');
            };
            
        } catch (error) {
            showToast('Error loading issue details', 'error');
        }
    };

    const logout = () => {
        clearAuthToken();
        appState.currentUser = null;
        DOMElements.appContainer.classList.add('logged-out');
        showOnboarding();
    };

    const showOnboarding = () => {
        openModal(`
            <div class="modal-overlay visible"><div class="modal-content" style="text-align:center;">
                <i class="fas fa-city" style="font-size:3rem; color: var(--primary-color); margin-bottom: 1rem;"></i>
                <h2>Welcome to CivicPulse Enhanced</h2><p style="color:var(--text-light); margin-bottom:1.5rem;">Join your community in making your area better with advanced photo reporting, intelligent duplicate detection, and spam filtering.</p>
                <div class="login-options"><button class="btn" id="loginBtn">Login</button><button class="btn secondary" id="registerBtn">Register</button></div>
            </div></div>`);

        document.getElementById('loginBtn').addEventListener('click', () => {
            openModal(`<div class="modal-overlay visible"><div class="modal-content"><button class="modal-close-btn">&times;</button><h2>Login</h2><form id="loginForm"><div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div><button type="submit" class="btn" style="width:100%;">Login</button></form></div></div>`);
        });

        document.getElementById('registerBtn').addEventListener('click', () => {
            openModal(`<div class="modal-overlay visible"><div class="modal-content"><button class="modal-close-btn">&times;</button><h2>Create Your Profile</h2><form id="registrationForm"><div class="profile-details-grid"><div class="form-group"><label>Name</label><input type="text" id="regName" required></div><div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div><div class="form-group"><label>Password</label><input type="password" id="regPassword" required></div><div class="form-group"><label>Phone</label><input type="tel" id="regPhone" required></div><div class="form-group"><label>Age</label><input type="number" id="regAge" required></div><div class="form-group"><label>Sex</label><select id="regSex" required><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div></div><div class="form-group"><label>Aadhaar Number</label><input type="text" id="regAadhaar" required pattern="\\d{12}"></div><div class="form-group"><label>Address</label><input type="text" id="regAddress" required></div><button type="submit" class="btn" style="width:100%;">Create Profile</button></form></div></div>`);
        });
    };

    const initApp = async () => {
        DOMElements.appContainer.classList.remove('logged-out');
        await loadUserProfile();
        await refreshDashboard();
        
        const savedDarkMode = localStorage.getItem('dark-mode') === 'true';
        const savedLanguage = localStorage.getItem('selected-language') || 'en';
        
        if (savedDarkMode) {
            document.body.classList.add('dark-mode');
            const darkModeBtn = document.getElementById('darkModeBtn');
            if (darkModeBtn) darkModeBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }
        
        appState.currentLanguage = savedLanguage;
        translateUI();
        
        // Setup language dropdown with all languages
        const languageDropdown = document.getElementById('languageDropdown');
        if (languageDropdown) {
            languageDropdown.innerHTML = `
                <div class="dropdown-item language-option" data-lang="en">🇺🇸 English</div>
                <div class="dropdown-item language-option" data-lang="hi">🇮🇳 हिन्दी</div>
                <div class="dropdown-item language-option" data-lang="ta">🇮🇳 தமிழ்</div>
                <div class="dropdown-item language-option" data-lang="te">🇮🇳 తెలుగు</div>
                <div class="dropdown-item language-option" data-lang="ml">🇮🇳 മലയാളം</div>
                <div class="dropdown-item language-option" data-lang="bn">🇧🇩 বাংলা</div>`;
        }
        
        setTimeout(() => {
            const accessibilityPanel = document.querySelector('.accessibility-panel');
            if (accessibilityPanel) accessibilityPanel.style.display = 'flex';
        }, 100);
    };

    const setupEventListeners = () => {
        DOMElements.navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                showView(link.dataset.view);
                if (window.innerWidth <= 768) {
                    DOMElements.sidebar.classList.remove('active');
                    DOMElements.mobileOverlay.classList.remove('active');
                }
            });
        });

        DOMElements.reportIssueBtn.addEventListener('click', openReportModal);
        DOMElements.voiceReportBtn.addEventListener('click', openVoiceReportModal); // NEW
        
        DOMElements.profileBtn.addEventListener('click', () => {
            const user = appState.currentUser;
            openModal(`<div class="modal-overlay"><div class="modal-content" style="text-align:center;"><button class="modal-close-btn">&times;</button><img src="${user.avatar}" style="width:100px; height:100px; border-radius:50%; margin-bottom:1rem; border:4px solid var(--primary-color);"><h2>${user.name}</h2><p style="font-size:1.2rem; color:var(--primary-color); font-weight:bold;">${user.score.toLocaleString()} Points</p>${user.spam_reports > 0 ? `<p style="color: var(--danger-color); font-size: 0.9rem; margin-top: 0.5rem;"><i class="fas fa-exclamation-triangle"></i> ${user.spam_reports} spam reports</p>` : ''}<h3 style="margin-top:2rem; border-top:1px solid var(--border-color); padding-top:1.5rem;">Personal Details</h3><div class="profile-details-grid" style="text-align:left; margin-top:1rem;"><p><strong>Email:</strong> ${user.email}</p><p><strong>Phone:</strong> ${user.phone}</p><p><strong>Age:</strong> ${user.age}</p><p><strong>Sex:</strong> ${user.sex}</p><p><strong>Aadhaar:</strong> **** **** ${user.aadhaar?.slice(-4) || '****'}</p><p><strong>Address:</strong> ${user.address}</p></div><button class="btn" id="logoutBtn" style="margin-top:1.5rem;">Logout</button></div></div>`);
        });

        DOMElements.notificationsBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            DOMElements.notificationsDropdown.classList.toggle('show');
            if (appState.currentUser) {
                await API.users.markNotificationsRead();
                setTimeout(loadUserProfile, 300);
            }
        });

        DOMElements.menuToggle.addEventListener('click', () => {
            DOMElements.sidebar.classList.toggle('active');
            DOMElements.mobileOverlay.classList.toggle('active');
        });

        DOMElements.mobileOverlay.addEventListener('click', () => {
            DOMElements.sidebar.classList.remove('active');
            DOMElements.mobileOverlay.classList.remove('active');
        });
        
        const darkModeBtn = document.getElementById('darkModeBtn');
        if (darkModeBtn) {
            darkModeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                darkModeBtn.innerHTML = `<i class="fas fa-${isDark ? 'sun' : 'moon'}"></i>`;
                localStorage.setItem('dark-mode', isDark);
                showToast(`Switched to ${isDark ? 'dark' : 'light'} mode`, 'success');
            });
        }

        const languageBtn = document.getElementById('languageBtn');
        const languageDropdown = document.getElementById('languageDropdown');
        if (languageBtn && languageDropdown) {
            languageBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                languageDropdown.classList.toggle('show');
            });
        }

        document.addEventListener('click', (e) => {
            if (e.target.closest('.duplicate-modal')) return;
            if (e.target.classList.contains('modal-overlay') && !e.target.closest('.modal-content')) closeModal();
            if (!e.target.closest('.accessibility-btn') && !e.target.closest('.dropdown-menu')) {
                document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('show'));
            }
            if (e.target.classList.contains('theme-option')) {
                const theme = e.target.dataset.theme;
                const themes = { default: { primary: '#4f46e5', secondary: '#10b981', accent: '#f97316' }, rose: { primary: '#db2777', secondary: '#5eead4', accent: '#fb923c' }, forest: { primary: '#16a34a', secondary: '#facc15', accent: '#f97316' }, sunset: { primary: '#d97706', secondary: '#f43f5e', accent: '#6d28d9' } };
                document.documentElement.style.setProperty('--primary-color', themes[theme].primary);
                document.documentElement.style.setProperty('--secondary-color', themes[theme].secondary);
                document.documentElement.style.setProperty('--accent-color', themes[theme].accent);
                document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
                e.target.classList.add('active');
            }
            if (e.target.classList.contains('font-option')) {
                const font = e.target.dataset.font;
                document.documentElement.style.setProperty('--font-family', `"${font}", sans-serif`);
                document.querySelectorAll('.font-option').forEach(el => el.classList.remove('active'));
                e.target.classList.add('active');
            }
            if (e.target.classList.contains('language-option')) {
                const newLang = e.target.dataset.lang;
                appState.currentLanguage = newLang;
                translateUI();
                languageDropdown.classList.remove('show');
                localStorage.setItem('selected-language', newLang);
                showToast(`Language changed to ${e.target.textContent.split(' ')[1]}`, 'success');
            }
            if (e.target.classList.contains('toggle-switch')) {
                e.target.classList.toggle('active');
            }
        });

        document.getElementById('fontSizeSlider')?.addEventListener('input', (e) => {
            document.documentElement.style.fontSize = `${e.target.value}px`;
        });

        document.body.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (e.target.id === 'loginForm') {
                try {
                    const { user, token } = await API.users.login({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value });
                    setAuthToken(token);
                    appState.currentUser = user;
                    closeModal();
                    initApp();
                    showToast('Login successful!', 'success');
                } catch (error) { showToast(error.message, 'error'); }
            }

            if (e.target.id === 'registrationForm') {
                try {
                    const { user, token } = await API.users.register({ name: document.getElementById('regName').value, email: document.getElementById('regEmail').value, password: document.getElementById('regPassword').value, phone: document.getElementById('regPhone').value, age: document.getElementById('regAge').value, sex: document.getElementById('regSex').value, aadhaar: document.getElementById('regAadhaar').value, address: document.getElementById('regAddress').value });
                    setAuthToken(token);
                    appState.currentUser = user;
                    closeModal();
                    initApp();
                    showToast('Registration successful!', 'success');
                } catch (error) { showToast(error.message, 'error'); }
            }

            if (e.target.id === 'reportForm') {
                const issueData = {
                    title: document.getElementById('issueTitle').value,
                    category: document.getElementById('issueCategory').value,
                    location: document.getElementById('issueLocation').value,
                    description: document.getElementById('issueDescription').value,
                    photos: appState.uploadedPhotos,
                    coordinates: { lat: parseFloat(document.getElementById('issueLat').value), lng: parseFloat(document.getElementById('issueLng').value) }
                };
                try {
                    const duplicateCheck = await API.issues.checkDuplicate(issueData);
                    if (duplicateCheck.isDuplicate) {
                        closeModal();
                        openDuplicateModal(duplicateCheck, issueData);
                    } else {
                        await API.issues.create(issueData);
                        closeModal();
                        showToast('Report submitted successfully!', 'success');
                        await refreshDashboard();
                        await loadUserProfile();
                        appState.uploadedPhotos = [];
                    }
                } catch (error) {
                     showToast(error.message, 'error');
                }
            }

            if (e.target.id === 'reportSpamForm') {
                try {
                    const issueId = e.target.querySelector('[data-issue-id]').dataset.issueId;
                    const reason = document.getElementById('reportReason').value;
                    const details = document.getElementById('reportDetails').value;
                    await API.issues.report(issueId, { reason, details });
                    closeModal();
                    showToast('Issue reported successfully. Thank you!', 'success');
                    await refreshDashboard();
                } catch (error) { showToast(error.message, 'error'); }
            }

            if (e.target.id === 'commentForm') {
                try {
                    const issueId = e.target.dataset.issueId;
                    const text = document.getElementById('commentInput').value;
                    await API.issues.addComment(issueId, text);
                    showToast('Comment added!', 'success');
                    openIssueDetailModal(issueId);
                } catch (error) { showToast(error.message, 'error'); }
            }
        });

        document.body.addEventListener('click', async (e) => {
            if (e.target.closest('.duplicate-modal')) return;
            if (e.target.matches('.modal-close-btn')) closeModal();
            if (e.target.matches('.modal-overlay') && !e.target.closest('.modal-content')) closeModal();
            if (e.target.id === 'logoutBtn') logout();

            const issueCard = e.target.closest('.issue-card');
            if (issueCard && !e.target.closest('.upvote-btn, .report-btn, .card-actions')) {
                openIssueDetailModal(issueCard.dataset.issueId);
            }

            const voteBtn = e.target.closest('.upvote-btn');
            if (voteBtn) {
                try {
                    const voteType = voteBtn.dataset.voteType || 'upvote';
                    await API.issues.vote(voteBtn.dataset.issueId, voteType);
                    await showView(document.querySelector('.view.active').id);
                } catch (error) { showToast(error.message, 'error'); }
            }

            if (e.target.closest('.report-btn')) {
                openReportSpamModal(e.target.closest('.report-btn').dataset.issueId);
            }

            if (e.target.closest('.stat-card.clickable')) {
                const card = e.target.closest('.stat-card.clickable');
                if (card.dataset.view) {
                    showView(card.dataset.view);
                } else if (card.dataset.filter) {
                    const filter = card.dataset.filter;
                    let issuesToShow, title;
                    if (filter === 'all') {
                        issuesToShow = appState.issues.filter(i => i.status !== 'Spam' && i.status !== 'Removed');
                        title = 'All Active Issues';
                    } else {
                        issuesToShow = appState.issues.filter(i => i.status === filter);
                        title = `${filter} Issues`;
                    }
                    openIssueListModal(issuesToShow, title);
                }
            }
        });
    };

    document.addEventListener('DOMContentLoaded', () => {
        setupEventListeners();
        const token = getAuthToken();
        if (token) {
            initApp();
        } else {
            showOnboarding();
        }
    });
})();
</script>
</body>
</html>
